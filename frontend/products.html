<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse premium products — electronics, fashion, and books at ShopVerse.">
  <title>Products | ShopVerse</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">🛍️</div>
        <span>ShopVerse</span>
      </a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="products.html" class="nav-link">Products</a>
        <a href="cart.html" class="nav-link">Cart</a>
        <a href="admin.html" class="nav-link">Admin</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html" class="nav-icon-btn" title="Cart" id="nav-cart-btn">🛒<span class="badge cart-badge-count" style="display:none;">0</span></a>
        <a href="profile.html" class="nav-icon-btn" title="Profile" id="nav-profile-btn" style="display:none;">👤</a>
        <a href="login.html" class="nav-icon-btn" title="Login" id="nav-login-btn">🔑</a>
        <button class="nav-icon-btn" id="nav-logout-btn" style="display:none;" onclick="handleLogout()" title="Logout">🚪</button>
        <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <main class="products-page page-content">
    <div class="container">
      <!-- Page Header & Search -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-xl);flex-wrap:wrap;gap:var(--space-md);">
        <div>
          <h1 style="font-family:var(--font-display);font-size:2rem;font-weight:700;">All Products</h1>
          <p id="results-count" style="color:var(--text-secondary);margin-top:var(--space-xs);">Loading...</p>
        </div>
        <div style="display:flex;gap:var(--space-md);align-items:center;">
          <div class="search-wrapper" style="max-width:300px;">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-bar" id="search-input" placeholder="Search products..." aria-label="Search">
          </div>
          <select id="sort-select" class="form-input" style="width:180px;padding:10px 14px;border-radius:var(--radius-full);">
            <option value="default">Sort By</option>
            <option value="price-low">Price: Low → High</option>
            <option value="price-high">Price: High → Low</option>
            <option value="rating">Top Rated</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>
      </div>

      <div class="products-layout">
        <!-- Filters Sidebar -->
        <aside class="filters-sidebar">
          <div class="filter-group">
            <h3>Category</h3>
            <label class="filter-option"><input type="radio" name="category" value="all" checked> All Products</label>
            <label class="filter-option"><input type="radio" name="category" value="electronics"> ⚡ Electronics</label>
            <label class="filter-option"><input type="radio" name="category" value="fashion"> 👗 Fashion</label>
            <label class="filter-option"><input type="radio" name="category" value="books"> 📚 Books</label>
          </div>

          <div class="filter-group">
            <h3>Price Range</h3>
            <div class="price-range-inputs">
              <input type="number" class="price-input" id="min-price" placeholder="Min" min="0">
              <span style="color:var(--text-muted);">–</span>
              <input type="number" class="price-input" id="max-price" placeholder="Max" min="0">
            </div>
            <button class="btn btn-outline btn-sm" id="apply-price" style="width:100%;margin-top:var(--space-sm);">Apply</button>
          </div>

          <div class="filter-group">
            <h3>Rating</h3>
            <label class="filter-option"><input type="radio" name="rating" value="0" checked> All Ratings</label>
            <label class="filter-option"><input type="radio" name="rating" value="4"> <span class="rating-stars">★★★★☆</span> & up</label>
            <label class="filter-option"><input type="radio" name="rating" value="4.5"> <span class="rating-stars">★★★★★</span> 4.5+</label>
          </div>
        </aside>

        <!-- Products Grid -->
        <div class="products-grid" id="products-grid">
          <!-- Products loaded via JS -->
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© 2026 ShopVerse. All rights reserved.</span>
        <span>Built with ❤️ for the web</span>
      </div>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
