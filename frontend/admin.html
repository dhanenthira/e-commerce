<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin panel — ShopVerse.">
  <title>Admin Panel | ShopVerse</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo"><div class="logo-icon">🛍️</div><span>ShopVerse</span></a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="products.html" class="nav-link">Products</a>
        <a href="cart.html" class="nav-link">Cart</a>
        <a href="admin.html" class="nav-link">Admin</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html" class="nav-icon-btn" title="Cart" id="nav-cart-btn">🛒<span class="badge cart-badge-count" style="display:none;">0</span></a>
        <a href="profile.html" class="nav-icon-btn" title="Profile" id="nav-profile-btn" style="display:none;">👤</a>
        <a href="login.html" class="nav-icon-btn" title="Login" id="nav-login-btn">🔑</a>
        <button class="nav-icon-btn" id="nav-logout-btn" style="display:none;" onclick="handleLogout()" title="Logout">🚪</button>
        <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <main class="admin-page page-content">
    <div class="container">
      <h1 style="font-family:var(--font-display);font-size:2rem;font-weight:700;margin-bottom:var(--space-xl);">🛠️ Admin Panel</h1>

      <!-- Stats -->
      <div class="admin-stats" id="admin-stats">
        <!-- Loaded by admin.js -->
      </div>

      <div class="admin-grid" id="admin-content">
        <!-- Add Product Form -->
        <div class="admin-card">
          <h2>➕ Add New Product</h2>
          <form id="add-product-form">
            <div class="form-group">
              <label for="product-name-input">Product Name *</label>
              <input type="text" class="form-input" id="product-name-input" placeholder="Product name" required>
            </div>
            <div class="form-group">
              <label for="product-desc-input">Description</label>
              <textarea class="form-input" id="product-desc-input" placeholder="Product description..." rows="3" style="resize:vertical;"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="product-price-input">Price (₹) *</label>
                <input type="number" class="form-input" id="product-price-input" placeholder="999" required min="1">
              </div>
              <div class="form-group">
                <label for="product-original-price-input">Original Price (₹)</label>
                <input type="number" class="form-input" id="product-original-price-input" placeholder="1499" min="0">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="product-category-input">Category *</label>
                <select class="form-input" id="product-category-input" required>
                  <option value="">Select</option>
                  <option value="electronics">Electronics</option>
                  <option value="fashion">Fashion</option>
                  <option value="books">Books</option>
                </select>
              </div>
              <div class="form-group">
                <label for="product-stock-input">Stock</label>
                <input type="number" class="form-input" id="product-stock-input" placeholder="100" min="0" value="100">
              </div>
            </div>
            <div class="form-group">
              <label for="product-brand-input">Brand</label>
              <input type="text" class="form-input" id="product-brand-input" placeholder="Brand name">
            </div>
            <div class="form-group">
              <label for="product-image-input">Image URL</label>
              <input type="url" class="form-input" id="product-image-input" placeholder="https://images.unsplash.com/...">
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Add Product</button>
          </form>
        </div>

        <!-- Product List -->
        <div class="admin-card">
          <h2>📋 Product Inventory</h2>
          <div id="admin-product-list">
            <div style="text-align:center;padding:var(--space-xl);">
              <div class="inline-spinner"></div>
              <p style="color:var(--text-muted);margin-top:var(--space-md);">Loading products...</p>
            </div>
          </div>
          <div style="margin-top:var(--space-lg);padding-top:var(--space-md);border-top:1px solid var(--border);">
            <button class="btn btn-accent" onclick="seedProducts()" style="width:100%;">🌱 Seed Demo Products</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© 2026 ShopVerse. All rights reserved.</span>
        <span>Built with ❤️ for the web</span>
      </div>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
