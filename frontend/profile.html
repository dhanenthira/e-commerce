<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your profile — ShopVerse.">
  <title>My Profile | ShopVerse</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo"><div class="logo-icon">🛍️</div><span>ShopVerse</span></a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="products.html" class="nav-link">Products</a>
        <a href="cart.html" class="nav-link">Cart</a>
        <a href="admin.html" class="nav-link">Admin</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html" class="nav-icon-btn" title="Cart" id="nav-cart-btn">🛒<span class="badge cart-badge-count" style="display:none;">0</span></a>
        <a href="profile.html" class="nav-icon-btn" title="Profile" id="nav-profile-btn" style="display:none;">👤</a>
        <a href="login.html" class="nav-icon-btn" title="Login" id="nav-login-btn">🔑</a>
        <button class="nav-icon-btn" id="nav-logout-btn" style="display:none;" onclick="handleLogout()" title="Logout">🚪</button>
        <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <main class="profile-page page-content">
    <div class="container">
      <!-- Profile Header -->
      <div class="profile-header" id="profile-header">
        <div class="profile-avatar">U</div>
        <div class="profile-info">
          <h1>Loading...</h1>
          <p>Please wait</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="profile-tabs">
        <button class="profile-tab active" data-tab="orders" onclick="showTab('orders')">📦 Orders</button>
        <button class="profile-tab" data-tab="wishlist" onclick="showTab('wishlist')">💝 Wishlist</button>
        <button class="profile-tab" data-tab="settings" onclick="showTab('settings')">⚙️ Settings</button>
      </div>

      <!-- Tab Content -->
      <div id="profile-content">
        <div style="text-align:center;padding:var(--space-3xl);">
          <div class="inline-spinner"></div>
          <p style="color:var(--text-secondary);margin-top:var(--space-md);">Loading your profile...</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© 2026 ShopVerse. All rights reserved.</span>
        <span>Built with ❤️ for the web</span>
      </div>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
