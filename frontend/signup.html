<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your ShopVerse account.">
  <title>Sign Up | ShopVerse</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo"><div class="logo-icon">🛍️</div><span>ShopVerse</span></a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="products.html" class="nav-link">Products</a>
        <a href="cart.html" class="nav-link">Cart</a>
      </div>
      <div class="nav-actions">
        <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <main class="auth-page page-content">
    <div class="auth-container">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Join ShopVerse for exclusive deals</p>
      </div>

      <form id="signup-form">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" class="form-input" id="signup-name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" class="form-input" id="signup-password" placeholder="••••••••" required minlength="6">
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <input type="password" class="form-input" id="signup-confirm" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
      </form>

      <div class="auth-divider">or continue with</div>

      <button class="btn btn-outline btn-lg" id="google-signin" style="width:100%;">
        🌐 Sign up with Google
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
