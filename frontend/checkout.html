<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Secure checkout — ShopVerse.">
  <title>Checkout | ShopVerse</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo"><div class="logo-icon">🛍️</div><span>ShopVerse</span></a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="products.html" class="nav-link">Products</a>
        <a href="cart.html" class="nav-link">Cart</a>
        <a href="admin.html" class="nav-link">Admin</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html" class="nav-icon-btn" title="Cart" id="nav-cart-btn">🛒<span class="badge cart-badge-count" style="display:none;">0</span></a>
        <a href="profile.html" class="nav-icon-btn" title="Profile" id="nav-profile-btn" style="display:none;">👤</a>
        <a href="login.html" class="nav-icon-btn" title="Login" id="nav-login-btn">🔑</a>
        <button class="nav-icon-btn" id="nav-logout-btn" style="display:none;" onclick="handleLogout()" title="Logout">🚪</button>
        <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <main class="checkout-page page-content">
    <div class="container">
      <h1 style="font-family:var(--font-display);font-size:2rem;font-weight:700;margin-bottom:var(--space-xl);">Checkout</h1>

      <div class="checkout-layout">
        <!-- Shipping Form -->
        <div class="checkout-form-section">
          <h2>Shipping Details</h2>
          <form id="checkout-form">
            <div class="form-row">
              <div class="form-group">
                <label for="checkout-name">Full Name *</label>
                <input type="text" class="form-input" id="checkout-name" placeholder="John Doe" required>
              </div>
              <div class="form-group">
                <label for="checkout-email">Email *</label>
                <input type="email" class="form-input" id="checkout-email" placeholder="john@example.com" required>
              </div>
            </div>
            <div class="form-group">
              <label for="checkout-phone">Phone Number *</label>
              <input type="tel" class="form-input" id="checkout-phone" placeholder="+91 XXXXX XXXXX" required>
            </div>
            <div class="form-group">
              <label for="checkout-address">Street Address *</label>
              <input type="text" class="form-input" id="checkout-address" placeholder="123 Main Street, Apt 4B" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="checkout-city">City *</label>
                <input type="text" class="form-input" id="checkout-city" placeholder="Mumbai" required>
              </div>
              <div class="form-group">
                <label for="checkout-state">State *</label>
                <input type="text" class="form-input" id="checkout-state" placeholder="Maharashtra" required>
              </div>
            </div>
            <div class="form-group">
              <label for="checkout-pincode">PIN Code *</label>
              <input type="text" class="form-input" id="checkout-pincode" placeholder="400001" maxlength="6" required>
            </div>

            <button type="submit" class="btn btn-accent btn-lg" style="width:100%;margin-top:var(--space-lg);">
              🔒 Pay & Place Order
            </button>
          </form>
        </div>

        <!-- Order Summary -->
        <div class="cart-summary" id="checkout-summary">
          <!-- Loaded by checkout.js -->
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© 2026 ShopVerse. All rights reserved.</span>
        <span>Built with ❤️ for the web</span>
      </div>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
